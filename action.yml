name: SignServer Signing
author: Hanna Hansson
description: Sign an input file with SignServer

branding:
  icon: 'edit-3'
  color: 'blue'

inputs:
  endpoint:
    description: The SignServer signing endpoint.
    required: true
  file-path:
    description: The path to the file to be signed
    required: true
  worker-name:
    description: The name of the Signer to use for the signing. 
    required: true
  client-cert:
    description: The client cert needed for authorization
    default: null
    required: false
  password:
    description: Password for clientcert.
    required: false
  output-file-name:
    description: Name of the signed output file.
    required: true
  disable-cert-val:
    description: Property to disable certificate validation when using curl. Default value is false.
    type: boolean
    required: false
    default: false
  rest:
    description: If true REST api is used to make the call to SignServer. Default value is true.
    type: boolean
    required: false
    default: true
    
runs:
  using: "composite"
  steps:
    # - name: Worker check
    # Not supported until we have a REST call that returns id when name is provided since id is needed to request worker config.
 
    - name: Invoke signing
      shell: bash
      id: signed_input
      env:
        WORKER_NAME: ${{inputs.worker-name}}
        FILE_PATH: ${{inputs.file-path}}
        ENDPOINT: ${{inputs.endpoint}}
        CLIENT_CERT: ${{inputs.client-cert}}
        PASSWORD: ${{inputs.password}}
        OUTPUT: ${{inputs.output-file-name}}
        DISABLE_CERT_VAL: ${{inputs.disable-cert-val}}
        REST: ${{inputs.rest}}
        
      run: |
        if [ "$REST" == "true" ]; then
          if [ "$CLIENT_CERT" == "" ]; then
            echo ${ENDPOINT}/rest/v1/workers/${WORKER_NAME}/process
            curl --output ${OUTPUT} --location --request POST '${ENDPOINT}/rest/v1/workers/${WORKER_NAME}/process' --header 'X-Keyfactor-Requested-With: REST' --header 'Accept: application/octet-stream' --form 'file=@${FILE_PATH}' --form 'type=multipart/form-data'
          elif [ "$CLIENT_CERT" != "" ]; then
            if [ "$DISABLE_CERT_VAL" == "true" ]; then
              curl --output ${OUTPUT} --location --request POST '${ENDPOINT}/process' --header 'X-Keyfactor-Requested-With: REST' --header 'Accept: application/octet-stream' --form 'myfile=@${FILE_PATH}' --form 'type=multipart/form-data;charset=utf-8' --cert-type P12 --cert ${CLIENT_CERT}:${PASSWORD} --insecure
            elif ["$DISABLE_CERT_VAL" == "false" ]; then
              curl --output ${OUTPUT} --location --request POST '${ENDPOINT}/process' --header 'X-Keyfactor-Requested-With: REST' --header 'Accept: application/octet-stream' --form 'myfile=@${FILE_PATH}' --form 'type=multipart/form-data;charset=utf-8' --cert-type P12 --cert ${CLIENT_CERT}:${PASSWORD}
            fi
          fi
          echo "OUTPUT=${OUTPUT}" >> $GITHUB_ENV
        elif [ "$REST" == "false" ]; then
          if [ "$CLIENT_CERT" == "" ]; then
            curl -F workerName=${WORKER_NAME} -F file=@${FILE_PATH} --output ${OUTPUT} ${ENDPOINT}/process
          elif [ "$CLIENT_CERT" != "" ]; then
            if [ "$DISABLE_CERT_VAL" == "true" ]; then
              curl -F workerName=${WORKER_NAME} -F file=@${FILE_PATH} --cert-type P12 --cert ${CLIENT_CERT}:${PASSWORD}  --output ${OUTPUT} ${ENDPOINT}/process --insecure
            elif ["$DISABLE_CERT_VAL" == "false" ]; then
              curl -F workerName=${WORKER_NAME} -F file=@${FILE_PATH} --cert-type P12 --cert ${CLIENT_CERT}:${PASSWORD}  --output ${OUTPUT} ${ENDPOINT}/process
            fi
          fi
          echo "OUTPUT=${OUTPUT}" >> $GITHUB_ENV
        fi
        
    - name: Upload signed file to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.OUTPUT }}
        path: ${{ env.OUTPUT }}
        retention-days: 1

