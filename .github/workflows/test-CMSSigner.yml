name: test-CMSSigner

on:
 workflow_dispatch:
 push:
   branches: [update-to-support-more-workers]

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
       
    - name: Start SignServer Container
      run: sudo docker run -d -it --rm --name signserver -p 80:8080 -p 443:8443 -e LOG_LEVEL_APP=DEBUG ALLOW_ANY=true -v /home/runner/work/signserver-signing-action/signserver-signing-action/testing/ManagementCA.cacert.crt:/mnt/external/secrets/tls/cas/ManagementCA.crt -h localhost keyfactor/signserver-ce:7.3.2  
          
    - name: Wait for Container to deploy
      run: sleep 180s
      shell: bash

    - name: Add CryptoTokenP12
      run: |
          curl --cert-type P12 --cert /home/runner/work/signserver-signing-action/signserver-signing-action/testing/TestCN.p12:foo123 \
          -d '{"properties": {
                "KEYSTOREPATH": "/opt/signserver/res/test/dss10/dss10_keystore.p12",
                "IMPLEMENTATION_CLASS": "org.signserver.server.signers.CryptoWorker",
                "KEYSTORETYPE": "PKCS12",
                "TYPE": "CRYPTO_WORKER",
                "CRYPTOTOKEN_IMPLEMENTATION_CLASS": "org.signserver.server.cryptotokens.KeystoreCryptoToken",
                "KEYSTOREPASSWORD": "foo123",
                "NAME": "CryptoTokenP12" }}' \
          -H "Content-Type: application/json" \
          -H "X-Keyfactor-Requested-With: 1" https://localhost:443/signserver/rest/v1/workers \
          --insecure 
             
    - name: Add CMSSigner
      run: |
          curl --cert-type P12 --cert /home/runner/work/signserver-signing-action/signserver-signing-action/testing/TestCN.p12:foo123 \-d '{"properties": {
                "DEFAULTKEY": "signer00003",
                "NAME": "CMSSigner",
                "ACCEPTED_HASH_DIGEST_ALGORITHMS": "SHA-256,SHA-384,SHA-512",
                "CRYPTOTOKEN": "CryptoTokenP12",
                "AUTHTYPE": "NOAUTH",
                "IMPLEMENTATION_CLASS": "org.signserver.module.cmssigner.CMSSigner",
                "TYPE": "PROCESSABLE",
                "DETACHEDSIGNATURE": "false",
                "ALLOW_DETACHEDSIGNATURE_OVERRIDE": "false",
                "DISABLEKEYUSAGECOUNTER": "true" }}' \
          -H "Content-Type: application/json"  \
          -H "X-Keyfactor-Requested-With: 1" \
          https://localhost:443/signserver/rest/v1/workers \
          --insecure
          
    - name: Create file to sign
      run: |
        echo "data to sign" > test
      
    - name: Sign CMS openssl
      id: sign-file-openssl
      uses: ./
      with:
        endpoint: http://localhost:80/signserver
        file-path: ./test
        worker-name: CMSSigner
        output-file-name: test-openssl.p7s
        rest: false

    - name: Sign CMS REST
      id: sign-file-rest
      uses: ./
      with:
        endpoint: http://localhost:80/signserver
        file-path: ./test
        worker-name: CMSSigner
        output-file-name: test-rest.p7s
